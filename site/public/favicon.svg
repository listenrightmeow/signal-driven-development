<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>SDD — Signal-Driven Development</title>
  <!-- Three dots converging to one: the convergence motif -->
  <!-- Pass 1: scattered -->
  <circle cx="6" cy="6" r="3" fill="#EF4444" opacity="0.4"/>
  <circle cx="26" cy="8" r="3" fill="#EAB308" opacity="0.4"/>
  <circle cx="10" cy="24" r="3" fill="#8B5CF6" opacity="0.4"/>
  <!-- Pass 2: clustered -->
  <circle cx="14" cy="14" r="2.5" fill="#EAB308" opacity="0.6"/>
  <circle cx="20" cy="18" r="2.5" fill="#3B82F6" opacity="0.6"/>
  <!-- Pass 3: converged -->
  <circle cx="16" cy="16" r="4" fill="#22C55E"/>
</svg>
