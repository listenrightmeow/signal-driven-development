config:
  # Disable line length — this is a prose-heavy methodology repo, not code
  MD013: false
  # Disable first-line heading — GitHub issue/PR templates use YAML front matter
  MD041: false
  # Allow duplicate headings under different parents (e.g., "Examples" under each gap category)
  MD024:
    siblings_only: true
  # Disable table column style — compact pipe style is intentional in PRD tables
  MD060: false
  # Allow specific HTML elements for centering images
  MD033:
    allowed_elements:
      - p
      - img
